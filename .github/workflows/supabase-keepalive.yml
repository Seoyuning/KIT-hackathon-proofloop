name: Supabase Keep-Alive

# Supabase free-tier projects are paused after ~1 week of no database
# activity. This workflow runs a tiny SELECT against the public `keepalive`
# table every 3 days to keep the project warm.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       e.g. https://klmskyieglvxxcgbsftx.supabase.co
#   SUPABASE_ANON_KEY  the anon public key

on:
  schedule:
    # 03:17 UTC every 3 days — offset from the hour so it doesn't collide
    # with Actions' top-of-hour scheduling surges.
    - cron: "17 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping public.keepalive via PostgREST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keepalive?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Keep-alive ping failed with status $status"
            exit 1
          fi
